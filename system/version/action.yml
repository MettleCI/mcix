name: 'MCIX System Version'
author: 'Data Migrators Pty Ltd'
description: 'Retrieve details on the MCIX container providing DataStage CI/CD capabilities for IBM Software Hub (Cloud Pak)'
branding:
  icon: 'info'
  color: 'blue'

inputs:
  container-registry:
    description: 'The path of the container registry, eg "icr.io"'
    required: false
    default: 'icr.io'
  image-name:
    description: 'The namespace and name of the MCIX container image providing this task'
    required: false
    default: 'mettleci/mcix'
  image-tag:
    description: 'The tag of the MCIX container image providing this task'
    required: false
    default: 'latest'

  additional-args:
    description: 'Additional raw arguments to append to the mcix command'
    required: false

outputs:
  return-code:
    description: 'The return code of the command'

runs:
  using: 'composite'
  steps:
# Image name prioritises in order
#   1 - Environment variables (if IMAGE_REGISTRY defined and not empty):
#       - IMAGE_REGISTRY
#       - IMAGE_NAME (default 'mettleci/mcix')
#       - IMAGE_TAG (default 'latest')
#   2 - Custom action inputs: 
#       - container-registry (default 'icr.io')
#       - image-name (default 'mettleci/mcix')
#       - image-tag (default 'latest')
    - name: Assemble full image name
      id: image
      shell: bash
      run: |
        if [[ -n $IMAGE_REGISTRY ]]; then
          echo "Found environment variable IMAGE_REGISTRY: using IMAGE_REGISTRY/IMAGE_NAME(default 'mettleci/mcix'):IMAGE_TAG(default 'latest')"
          echo full_path="$IMAGE_REGISTRY/${IMAGE_NAME:-mettleci/mcix}:${IMAGE_TAG:-latest}">> $GITHUB_OUTPUT
        else
          echo full_path="${{ inputs.container-registry }}/${{ inputs.image_name }}:${{ inputs.image_tag }}">> $GITHUB_OUTPUT
        fi

    - name: Run Entrypoint in Variable Base Image
      shell: bash
      run: |
        # 1. Pull the specified variable image
        docker pull ${{ steps.image.outputs.full_path }}
        
        # 2. Run the image, mounting the entrypoint and passing inputs as env vars
        docker run --rm \
          -v ${{ github.workspace }}:/github/workspace \
          -v ${{ github.action_path }}/entrypoint.sh:/entrypoint.sh \
          -w /github/workspace \
          -e PARAM_ACTION_DETAILS="${{ inputs.action-details }}" \
          -e PARAM_ADDITIONAL_ARGS="${{ inputs.additional-args }}" \
          -v "$GITHUB_OUTPUT:$GITHUB_OUTPUT" \
          -e GITHUB_OUTPUT="$GITHUB_OUTPUT" \
          --entrypoint /bin/bash \
          ${{ steps.image.outputs.full_path }} \
          /entrypoint.sh

