name: "MCIX Overlay Apply"
description: "Apply overlay directories to exported IBM Software Hub (Cloud Pak) DataStage assets using the MettleCI MCIX CLI"
author: "DataMigrators"
branding:
  icon: "layers"
  color: "blue"

inputs:
  assets:
    description: "Path to DataStage export zip file or directory."
    required: true
  output:
    description: "Zip file or directory to write updated assets."
    required: true
  overlays:
    description: |
      One or more overlay directories. Overlays are applied in the order specified.
      Provide as comma- or newline-separated list.
      Example:
        overlays: overlays/base, overlays/customer
        or
        overlays: |
          overlays/base
          overlays/customer
    required: true
  properties:
    description: "Optional properties file with replacement values."
    required: false
    default: ""
  additional-args:
    description: 'Additional raw arguments to append to the mcix command'
    required: false


outputs:
  return-code:
    description: "Exit code returned by the mcix overlay apply command."

runs:
  using: docker
  image: Dockerfile
  env:
    PARAM_API_KEY: ${{ inputs.api-key }}
    PARAM_URL: ${{ inputs.url }}
    PARAM_USER: ${{ inputs.user }}
    PARAM_REPORT: ${{ inputs.report }}
    PARAM_PROJECT: ${{ inputs.project }}
    PARAM_PROJECT_ID: ${{ inputs.project-id }}
    PARAM_ADDITIONAL_ARGS: ${{ inputs.additional-args }}